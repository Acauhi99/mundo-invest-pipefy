name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: |
          cd modules/cliente && golangci-lint run ./... && cd ../..
          cd modules/webhook && golangci-lint run ./... && cd ../..
          cd cmd/server && golangci-lint run ./... && cd ../..

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go test -buildvcs=false github.com/mundoinvest/cliente/... github.com/mundoinvest/webhook/...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: |
          cd cmd/server && govulncheck ./... && cd ../..
          cd modules/cliente && govulncheck ./... && cd ../..
          cd modules/webhook && govulncheck ./... && cd ../..

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api:latest

  deploy-fake:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying to AWS..."
